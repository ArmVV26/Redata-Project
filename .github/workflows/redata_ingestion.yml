name: REData Ingestion + dbt Cloud

on:
  # ── Ejecución automática: día 15 de cada mes a las 06:00 UTC ──
  schedule:
    - cron: "0 6 15 * *"

  # ── Ejecución manual desde GitHub UI ──────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecución"
        required: true
        default: "monthly"
        type: choice
        options:
          - monthly
          - backfill
          - custom
      start_date:
        description: "Fecha inicio (solo para mode=custom). Ej: 2026-01-01T00:00"
        required: false
        default: ""
      end_date:
        description: "Fecha fin (solo para mode=custom). Ej: 2026-04-30T23:59"
        required: false
        default: ""

jobs:
  # ────────────────────────────────────────────────────────────────
  ingestion:
    name: "Python ingestion → Snowflake Bronze"
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA:    ${{ secrets.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}

    defaults:
      run:
        working-directory: ingestion

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # El schedule siempre usa monthly.
      # El workflow_dispatch usa el input elegido en el UI.
      - name: Determinar modo y fechas
        id: params
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=monthly"      >> $GITHUB_OUTPUT
            echo "start_date="       >> $GITHUB_OUTPUT
            echo "end_date="         >> $GITHUB_OUTPUT
          else
            echo "mode=${{ github.event.inputs.mode }}"             >> $GITHUB_OUTPUT
            echo "start_date=${{ github.event.inputs.start_date }}" >> $GITHUB_OUTPUT
            echo "end_date=${{ github.event.inputs.end_date }}"     >> $GITHUB_OUTPUT
          fi

      - name: Ejecutar ingesta (monthly / backfill)
        if: steps.params.outputs.mode != 'custom'
        run: |
          python src/main.py --mode ${{ steps.params.outputs.mode }}

      - name: Ejecutar ingesta (custom)
        if: steps.params.outputs.mode == 'custom'
        run: |
          python src/main.py \
            --mode custom \
            --start-date "${{ steps.params.outputs.start_date }}" \
            --end-date   "${{ steps.params.outputs.end_date }}"


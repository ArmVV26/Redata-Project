name: REData Ingestion + dbt Cloud

on:
  # ── Ejecución automática: día 15 de cada mes a las 06:00 UTC ──
  schedule:
    - cron: "0 6 15 * *"

  # ── Ejecución manual desde GitHub UI ──────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecución"
        required: true
        default: "monthly"
        type: choice
        options:
          - monthly
          - backfill
          - custom
      start_date:
        description: "Fecha inicio (solo para mode=custom). Ej: 2026-01-01T00:00"
        required: false
        default: ""
      end_date:
        description: "Fecha fin (solo para mode=custom). Ej: 2026-04-30T23:59"
        required: false
        default: ""

jobs:
  # ────────────────────────────────────────────────────────────────
  ingestion:
    name: "Python ingestion → Snowflake Bronze"
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA:    ${{ secrets.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # El schedule siempre usa monthly.
      # El workflow_dispatch usa el input elegido en el UI.
      - name: Determinar modo y fechas
        id: params
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=monthly"      >> $GITHUB_OUTPUT
            echo "start_date="       >> $GITHUB_OUTPUT
            echo "end_date="         >> $GITHUB_OUTPUT
          else
            echo "mode=${{ github.event.inputs.mode }}"             >> $GITHUB_OUTPUT
            echo "start_date=${{ github.event.inputs.start_date }}" >> $GITHUB_OUTPUT
            echo "end_date=${{ github.event.inputs.end_date }}"     >> $GITHUB_OUTPUT
          fi

      - name: Ejecutar ingesta (monthly / backfill)
        if: steps.params.outputs.mode != 'custom'
        run: |
          python main.py --mode ${{ steps.params.outputs.mode }}

      - name: Ejecutar ingesta (custom)
        if: steps.params.outputs.mode == 'custom'
        run: |
          python main.py \
            --mode custom \
            --start-date "${{ steps.params.outputs.start_date }}" \
            --end-date   "${{ steps.params.outputs.end_date }}"

  # ────────────────────────────────────────────────────────────────
  dbt_cloud:
    name: "Lanzar job dbt Cloud"
    runs-on: ubuntu-latest
    needs: ingestion          # Solo se ejecuta si ingestion termina OK

    steps:
      - name: Disparar job dbt Cloud
        id: trigger
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --request POST \
            --url "https://cloud.getdbt.com/api/v2/accounts/${{ secrets.DBT_CLOUD_ACCOUNT_ID }}/jobs/${{ secrets.DBT_CLOUD_JOB_ID }}/run/" \
            --header "Authorization: Token ${{ secrets.DBT_CLOUD_API_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{"cause": "Triggered by GitHub Actions"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Error al lanzar el job dbt Cloud. HTTP status: $HTTP_CODE"
            exit 1
          fi

          RUN_ID=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['id'])")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Job lanzado con run_id: $RUN_ID"
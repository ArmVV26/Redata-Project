version: 2

models:
  - name: balance_measurements

    description: >
      Tabla core de mediciones del Balance Elétrico de REData.
      'balance_id' es un surrogate generado sobre: technology_id, region_id,
      time_trunc y datetime_ree.
      Granularidad: technology_id + region_id + time_trunc + datetime_ree
  
    columns:
      - name: balance_id
        description: >
          Clave surrogate generada con dbt_utils.generate_surrogate_key sobre
          'technology_id', 'geo_id', 'time_trunc' y 'datetime_ree'.
        data_type: varchar
        data_tests:
          - unique
          - not_null

      - name: technology_id
        description: FK hacia technology.technology_id.
        data_type: varchar
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('ref_technology')
                field: technology_id

      - name: region_id
        description: FK hacia region.region_id
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('ref_regions')
                field: region_id

      - name: time_trunc
        description: Granularidad temporal de la medición.
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['hour', 'day', 'month', 'year']
                severity: warn

      - name: datetime_ree
        description: Timestamp de la medición, renombrado desde 'datetime_ree'.
        data_type: timestamp_ntz
        data_tests:
          - not_null

      - name: value_mwh
        description: Valor energético en MWh.
        data_type: float
        data_tests:
          - not_null

      - name: source_percentage
        description: Porcentaje sobre el total en el instante dado.
        data_type: float
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: 
                min_value: 0
                max_value: 1
                severity: warn

      - name: request_id
        description: Trazabilidad hacia la petición de ingesta de origen en Bronze.
        data_type: varchar
        data_tests:
          - not_null

      - name: loaded_at
        description: Timestamp de carga en Bronze del registro de origen.
        data_type: timestamp_ntz
        data_tests:
          - not_null


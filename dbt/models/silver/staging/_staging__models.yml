  - name: stg_red_electrica__market_measurement
    
    description: >
      Staging de mediciones de mercados/componentes-precio-energia-cierre-desglose. 
      Aplana los registros de RAW_JSON de MARKET_RESPONSE, renombra y castea tipos.
      Granularidad: request_id + component_id + time_trunc + datetime_raw
   
    columns:
      - name: request_id
        description: Identificador único de la petición de la ingesta.
        data_type: varchar
        data_tests:
          - not_null
          
      - name: loaded_at

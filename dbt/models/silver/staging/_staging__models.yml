        description: Precio en EUR/MWh para el componente y datetime.
        data_type: float
        data_tests:
          - not_null

      - name: percentage
        description: Porcentaje del total que representa este componente de precio.
        data_type: float
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: 

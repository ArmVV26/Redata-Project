          - not_null
          - accepted_values:
              arguments: 
                values: ['hour', 'day', 'month', 'year']
                severity: warn

      - name: component_id
        description: Identificador del componente de precio tal como viene de REData.
        data_type: varchar
        data_tests:
          - not_null

      - name: component_name
        description: Nombre del componente de precio tal como viene de REData.
        data_type: varchar
        data_tests:
          - not_null

      - name: group_name
        description: Nombre del grupo al que pertenece el componente de precio.
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments: 
                values: ['Servicios-ajuste', 'Precio total', 'Energia', 'Mercados', 'Servicios-pagos']
